<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Amiri', 'Scheherazade', serif;
      background: #0a0f1a;
      color: #e0e0e0;
    }
    .header {
      background: #1a472a;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #2ecc71;
    }
    .header h1 { font-size: 24px; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .surah-item {
      background: #1a1a2e;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .surah-item:hover { background: #2a2a3e; }
    .surah-arabic { font-size: 20px; font-weight: bold; }
    .surah-english { font-size: 12px; color: #aaa; margin-top: 4px; }
    .verse-count { font-size: 12px; color: #888; }
    .back-btn {
      background: #2ecc71;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .verse {
      background: #1a1a2e;
      margin: 15px 0;
      padding: 15px;
      border-radius: 8px;
      border-right: 3px solid #2ecc71;
    }
    .verse-number {
      background: #2ecc71;
      display: inline-block;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-size: 11px;
      margin-left: 10px;
    }
    .verse-text {
      font-size: 22px;
      text-align: right;
      direction: rtl;
      margin-top: 10px;
      line-height: 1.8;
    }
    .translation {
      font-size: 14px;
      color: #aaa;
      margin-top: 10px;
      font-style: italic;
    }
    .loading, .error { text-align: center; padding: 50px; }
    .error { color: #e74c3c; }
    .hide { display: none; }
    .feature-badge {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #2ecc71;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
    }
    <style>
  /* Theme support */
  body.dark { background: #0a0f1a; color: #e0e0e0; }
  body.light { background: #f0f2f5; color: #2c3e50; }
  
  body.dark .surah-item { background: #1a1a2e; border: 1px solid #2c2c3e; }
  body.light .surah-item { background: white; border: 1px solid #ddd; }
  
  body.dark .verse { background: #1a1a2e; }
  body.light .verse { background: white; border: 1px solid #eee; }
  
  body.dark .header { background: #1a472a; }
  body.light .header { background: #2ecc71; }
</style>
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 Quran Reader</h1>
  </div>
  
  <div id="surahListView">
    <div class="container">
      <div id="surahList" class="loading">Loading surahs...</div>
    </div>
  </div>
  
  <div id="readerView" class="hide">
    <div class="container">
      <button class="back-btn" onclick="showSurahList()">← Back to Surahs</button>
      <div id="readerContent"></div>
    </div>
  </div>
  
  <div id="featureBadge" class="feature-badge"></div>

  <script>
    let allSurahs = [];
    
    async function loadSurahs() {
      try {
        const res = await fetch('/api/surahs');
        const data = await res.json();
        if (data.success && data.surahs) {
          allSurahs = data.surahs;
          displaySurahs(allSurahs);
        } else {
          document.getElementById('surahList').innerHTML = '<div class="error">Failed to load surahs</div>';
        }
      } catch (err) {
        document.getElementById('surahList').innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    
    function displaySurahs(surahs) {
      const list = document.getElementById('surahList');
      list.innerHTML = surahs.map(s => `
        <div class="surah-item" onclick="loadSurah(${s.id})">
          <div>
            <div class="surah-arabic">${s.name_arabic}</div>
            <div class="surah-english">${s.name_simple}</div>
          </div>
          <div class="verse-count">${s.verses_count} verses</div>
        </div>
      `).join('');
    }
    
    async function loadSurah(id) {
      try {
        document.getElementById('readerContent').innerHTML = '<div class="loading">Loading...</div>';
        const res = await fetch(`/api/surah/${id}`);
        const data = await res.json();
        
        if (data.success && data.surah) {
          document.getElementById('surahListView').classList.add('hide');
          document.getElementById('readerView').classList.remove('hide');
          
          const content = document.getElementById('readerContent');
          content.innerHTML = `
            <div style="text-align:center; margin-bottom:30px">
              <h2>${data.surah.arabic_name}</h2>
              <p>${data.surah.english_name} • ${data.surah.total_verses} verses</p>
            </div>
            ${data.surah.verses.map(v => `
              <div class="verse">
                <span class="verse-number">${v.number}</span>
                <div class="verse-text">${v.arabic}</div>
                ${v.translation ? `<div class="translation">📖 ${v.translation}</div>` : ''}
              </div>
            `).join('')}
          `;
        }
      } catch (err) {
        document.getElementById('readerContent').innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }
    
    function showSurahList() {
      document.getElementById('surahListView').classList.remove('hide');
      document.getElementById('readerView').classList.add('hide');
      loadSurahs();
    }
      // Fetch theme from API and apply
  fetch('/api/info')
    .then(res => res.json())
    .then(config => {
      document.body.className = config.theme || 'dark';
      // Optional: change primary color
      if (config.primaryColor) {
        document.documentElement.style.setProperty('--primary', config.primaryColor);
      }
    })
    .catch(() => document.body.className = 'dark');
    
    // Show feature badge
    if (window.APP_CONFIG && window.APP_CONFIG.features) {
      document.getElementById('featureBadge').innerHTML = window.APP_CONFIG.features.join(' • ');
    }
    
    loadSurahs();
  </script>
</body>
</html>
